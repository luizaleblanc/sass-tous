services:
  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    networks:
      - public_net
      - internal_net
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    env_file:
      - .env
    networks:
      - internal_net
    volumes:
      - ./infra/mysql_v3:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal_net
    volumes:
      - ./infra/redis:/data

  worker:
    image: mcr.microsoft.com/playwright/python:v1.42.0-jammy
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && arq app.worker.WorkerSettings"
    volumes:
      - ./backend:/app
    networks:
      - worker_net
      - internal_net
    depends_on:
      - redis
    env_file:
      - .env

networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true
  worker_net:
    driver: bridge